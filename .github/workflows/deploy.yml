name: Deploy Frontend

on:
  push:
    branches: [master]

jobs:
  # ── Build compartilhado: todos os apps de uma vez ─────────────────────────────
  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [seller, buyer, checkout, admin]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npx ng build ${{ matrix.app }} --configuration production

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.app }}
          path: dist/${{ matrix.app }}/browser
          retention-days: 1

  # ── Deploy seller ─────────────────────────────────────────────────────────────
  deploy-seller:
    name: Deploy seller → app.sharket.com
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-seller
          path: dist/seller

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_SELLER }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/seller
          skip_app_build: true

  # ── Deploy buyer ──────────────────────────────────────────────────────────────
  deploy-buyer:
    name: Deploy buyer → conta.sharket.com
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-buyer
          path: dist/buyer

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_BUYER }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/buyer
          skip_app_build: true

  # ── Deploy checkout ───────────────────────────────────────────────────────────
  deploy-checkout:
    name: Deploy checkout → pay.sharket.com
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-checkout
          path: dist/checkout

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_CHECKOUT }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/checkout
          skip_app_build: true

  # ── Deploy admin ──────────────────────────────────────────────────────────────
  deploy-admin:
    name: Deploy admin → admin.sharket.com
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-admin
          path: dist/admin

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_ADMIN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/admin
          skip_app_build: true
