version: '3.9'

# Pré-requisito: certificados TLS em /etc/letsencrypt/live/<domínio>/
# Obter com: certbot certonly --standalone -d app.sharket.com -d conta.sharket.com -d pay.sharket.com -d admin.sharket.com

services:
  seller:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-sharket}/sharket-seller:latest
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.seller
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/app.sharket.com/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/app.sharket.com/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  buyer:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-sharket}/sharket-buyer:latest
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.buyer
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - /etc/letsencrypt/live/conta.sharket.com/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/conta.sharket.com/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  checkout:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-sharket}/sharket-checkout:latest
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.checkout
    ports:
      - "8081:80"
      - "8444:443"
    volumes:
      - /etc/letsencrypt/live/pay.sharket.com/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/pay.sharket.com/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  admin:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-sharket}/sharket-admin:latest
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.admin
    ports:
      - "8082:80"
      - "8445:443"
    volumes:
      - /etc/letsencrypt/live/admin.sharket.com/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/admin.sharket.com/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
