<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="brand">Sharket</div>

    <mat-nav-list>
      <a mat-list-item routerLink="/app/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>home</mat-icon>
        <span matListItemTitle>Início</span>
      </a>
      <a mat-list-item routerLink="/app/pedidos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>receipt_long</mat-icon>
        <span matListItemTitle>Meus Pedidos</span>
      </a>
      <a mat-list-item routerLink="/app/assinaturas" routerLinkActive="active-link">
        <mat-icon matListItemIcon>autorenew</mat-icon>
        <span matListItemTitle>Minhas Assinaturas</span>
      </a>
      <a mat-list-item routerLink="/app/perfil" routerLinkActive="active-link">
        <mat-icon matListItemIcon>person</mat-icon>
        <span matListItemTitle>Meu Perfil</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar>
      <span class="toolbar-spacer"></span>
      <span class="user-name">{{ auth.user()?.nome }}</span>
      <button mat-icon-button (click)="auth.logout()" title="Sair">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
