<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Sharket</mat-card-title>
      <mat-card-subtitle>Painel do Vendedor</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" autocomplete="email" />
          @if (form.controls.email.hasError('required')) {
            <mat-error>Email obrigatório</mat-error>
          } @else if (form.controls.email.hasError('email')) {
            <mat-error>Email inválido</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input
            matInput
            formControlName="senha"
            [type]="hidePassword() ? 'password' : 'text'"
            autocomplete="current-password"
          />
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hidePassword.set(!hidePassword())"
          >
            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          @if (form.controls.senha.hasError('required')) {
            <mat-error>Senha obrigatória</mat-error>
          }
        </mat-form-field>

        @if (error()) {
          <p class="error-msg">{{ error() }}</p>
        }

        <button
          mat-flat-button
          type="submit"
          [disabled]="loading() || form.invalid"
        >
          {{ loading() ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
